manifesto_versao: "1.0"

id: layout-engine
nome: "Motor de Composição Visual"
versao: "1.0.0"
descricao: >
  Monta peças visuais (posts, banners, slides) a partir de uma árvore de
  componentes reutilizáveis (React/HTML/CSS/SVG) e exporta um PNG via
  Playwright, sem usar IA para desenhar nem conhecer nenhuma empresa.
camada: capacidade-generica
categoria: design

entradas:
  - nome: composition
    tipo: object
    obrigatorio: true
    padrao: null
    descricao: >
      Árvore de composição: {format, width, height, style_tokens, root}. O
      nó `root` é sempre um componente `Post` com `children` (ver
      references/components.md para o schema completo e o catálogo de
      componentes).
  - nome: format
    tipo: string
    obrigatorio: false
    padrao: "instagram-feed"
    descricao: "Nome de um formato pré-definido (ver references/formats.json) que resolve width/height. Ignorado se width/height forem passados explicitamente."
  - nome: width
    tipo: integer
    obrigatorio: false
    padrao: null
    descricao: "Sobrescreve a largura em pixels do formato escolhido."
  - nome: height
    tipo: integer
    obrigatorio: false
    padrao: null
    descricao: "Sobrescreve a altura em pixels do formato escolhido."
  - nome: output_dir
    tipo: string
    obrigatorio: false
    padrao: "./generated-posts"
    descricao: "Pasta onde o PNG e o HTML intermediário são salvos (criada se não existir)."
  - nome: output_name
    tipo: string
    obrigatorio: false
    padrao: null
    descricao: "Prefixo do nome de arquivo. Padrão: slug do texto do Headline + timestamp."
  - nome: save_as_template
    tipo: boolean
    obrigatorio: false
    padrao: false
    descricao: "Quando true, grava a composição na biblioteca de templates (ver references/template-library.md)."
  - nome: template_slug
    tipo: string
    obrigatorio: false
    padrao: null
    descricao: "Obrigatório quando save_as_template=true. Nome da pasta do template dentro de templates_dir."
  - nome: templates_dir
    tipo: string
    obrigatorio: false
    padrao: "./templates"
    descricao: "Pasta raiz da biblioteca de templates (cada template vira uma subpasta <templates_dir>/<template_slug>/)."
  - nome: metadata
    tipo: "object | null"
    obrigatorio: false
    padrao: null
    descricao: "Conteúdo de metadata.json do template (categoria, tipo, objetivo, texto, imagem, complexidade, tags). Só usado com save_as_template=true; se omitido, grava um esqueleto para preenchimento manual."
  - nome: rationale
    tipo: "string | null"
    obrigatorio: false
    padrao: null
    descricao: "Conteúdo em Markdown de rationale.md do template. Só usado com save_as_template=true; se omitido, grava um esqueleto com as seções esperadas."

saidas:
  - nome: png
    tipo: object
    descricao: "{path, width, height} do PNG exportado."
  - nome: html
    tipo: object
    descricao: "{path} do HTML intermediário gerado (útil para depurar layout sem re-renderizar)."
  - nome: template
    tipo: "object | null"
    descricao: "{path, slug} da pasta de template criada, quando save_as_template=true; null caso contrário."
  - nome: composition_resolved
    tipo: object
    descricao: "A árvore de composição efetivamente renderizada, já com width/height/format resolvidos e defaults aplicados."
  - nome: error
    tipo: "string | null"
    descricao: "Mensagem de erro legível por humano (ex. componente desconhecido na árvore), quando aplicável."

contratos: []
dependencias: []

permissoes:
  - disco_leitura
  - disco_escrita
  - execucao_processo

modelos_compativeis: []

adapters_disponiveis:
  - agente: claude-code
    local: ".claude/skills/layout-engine/SKILL.md"
    status: implementado

custo_estimado: nao_aplicavel
timeout_segundos: 60

tags:
  - design
  - composicao-visual
  - post
  - template
  - react
  - playwright
  - marketing

autor: "Rick Caetano"
data_criacao: "2026-07-05"
status: implementada
observacoes: >
  Camada 2 (capacidade genérica): nunca lê empresas/** nem decide nada de
  marca/branding sozinha — cores, fontes, logo e texto chegam sempre
  explícitos em style_tokens/composition (ver CAPABILITY.md, seção
  "Regra de isolamento"). A decisão de aplicar identidade visual de uma
  empresa é responsabilidade de uma futura Capability de negócio
  (branded-layout-composer, ver ai/architecture/capability-registry.md),
  que consulta company-knowledge e então chama esta Capability com os
  parâmetros já resolvidos — mesmo padrão de branded-image-generator sobre
  image-generator. Requer Node.js 18+ e as dependências em
  scripts/package.json (react, react-dom, playwright) instaladas uma vez
  via `npm install` dentro de scripts/, e o browser do Playwright via
  `npx playwright install chromium`. Não testado com download real do
  Chromium neste ambiente por restrição de rede do sandbox de
  desenvolvimento (mesma limitação já registrada em
  ai/capabilities/image-generator/manifest.yaml) — validar a instalação do
  browser na máquina/CI onde a Capability for efetivamente executada.
