services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: empresa_ia
      POSTGRES_PASSWORD: empresa_ia
      POSTGRES_DB: empresa_ia
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    depends_on:
      - db
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://empresa_ia:empresa_ia@db:5432/empresa_ia
      STORAGE_BACKEND: filesystem
      STORAGE_ROOT: /data/storage
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      CORS_ORIGINS: "http://localhost:5173,http://localhost:8080,http://172.22.217.149:8080"
    ports:
      - "8000:8000"
    volumes:
      - storagedata:/data/storage
      - ./:/app

volumes:
  pgdata:
  storagedata:
